
<!DOCTYPE html>
<html>
<head>
<title>King Louie | Rock Wedding & Function Band</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="nextGigBar" class="next-gig-bar"></div>

<nav class="nav">
  <div class="navlinks">
    <a href="#gigs">Gigs</a>
    <a href="#videos">Videos</a>
    <a href="#gallery">Photos</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <img src="images/logo.png" class="hero-logo">
    <p class="hero-tag">Probably the best band in the world – covering Wiltshire & Hampshire</p>
    <div id="countdown" class="countdown"></div>
  </div>

</section>

<section id="gigs" class="section">

</section>

<section id="videos" class="section">

  <div class="video-grid">
    <iframe src="https://www.youtube.com/embed/l2LRv33g_PA" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/exjbLTjxL2c" allowfullscreen></iframe>
    <iframe src="https://www.youtube.com/embed/fxFY7ANLA_0" allowfullscreen></iframe>
  </div>
</section>

<section id="gallery" class="section">
  <h2>Gallery</h2>
  <div id="gallery-grid" class="gallery-grid"></div>
</section>

<div id="lightbox" class="lightbox">
  <span class="lightbox-close">&times;</span>
  <img id="lightbox-img">
</div>

<section id="contact" class="section">
  <div class="container">
    <h2>Bookings</h2>

    <a class="email-link" href="mailto:kinglouieband@outlook.com">
      kinglouieband@outlook.com
    </a>

    <a class="phone-link" href="tel:07766692746">
      07766 692746
    </a>
  </div>

<script src="script.js"></script>

</html>
