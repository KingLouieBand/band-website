<!DOCTYPE html>
<html>
<head>
  <title>King Louie | Rock Wedding & Function Band</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="nextGigBar" class="next-gig-bar"></div>

<nav class="nav">
  <div class="navlinks">
    <a href="#gigs">Gigs</a>
    <a href="#videos">Videos</a>
    <a href="#gallery">Photos</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="socials">
  <a href="https://www.facebook.com/kinglouieuk" target="_blank">
    <img src="images/facebook.svg" alt="Facebook">
  </a>
  <a href="https://www.instagram.com/king_louie_band/" target="_blank">
    <img src="images/instagram.svg" alt="Instagram">
  </a>
</div>

<section class="hero">
  <div class="hero-inner">
    <img src="images/logo.png" class="hero-logo">
    <p class="hero-tag">Probably the best band in the world – covering Wiltshire & Hampshire</p>
    <div id="countdown" class="countdown"></div>
  </div>
  <img src="images/monkey.png" class="hero-monkey">
</section>

<section id="gigs" class="section">
  <div class="container">
    <h2>Upcoming Gigs</h2>
    <div id="giglist" class="gig-cards"></div>
  </div>
</section>

<section id="videos" class="section">
  <div class="container">
    <h2>Videos</h2>
    <div class="video-grid">
      <iframe src="https://www.youtube.com/embed/l2LRv33g_PA"></iframe>
      <iframe src="https://www.youtube.com/embed/exjbLTjxL2c"></iframe>
      <iframe src="https://www.youtube.com/embed/fxFY7ANLA_0"></iframe>
    </div>
  </div>
</section>

<section id="gallery" class="section">
  <div class="container">
    <h2>Gallery</h2>
    <div id="gallery-grid" class="gallery-grid"></div>
  </div>
</section>

<section id="contact" class="section">
  <div class="container">
    <h2>Bookings</h2>

    <a class="email-link" href="mailto:kinglouieband@outlook.com">
      kinglouieband@outlook.com
    </a>

    <a class="phone-link" href="tel:07766692746">
      07766 692746
    </a>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
