<!DOCTYPE html>
<html>
<head>
<title>The Rusty Strings</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>The Rusty Strings</h1>
<p>Pub Rock | Hampshire</p>
</header>

<section>
<h2>Upcoming Gigs</h2>
<ul id="gigs"></ul>
</section>

<section>
<h2>Videos</h2>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/VIDEOID"
frameborder="0" allowfullscreen></iframe>
</section>

<section>
<h2>Contact</h2>
<p>Email: bookings@yourband.com</p>
</section>

<script>

fetch('gigs.json')
.then(res => res.json())
.then(data => {
const list = document.getElementById('gigs');

data.forEach(gig => {
const li = document.createElement('li');
li.innerText = gig.date + " - " + gig.venue + " (" + gig.city + ")";
list.appendChild(li);
});

});

</script>

</body>
</html>
